<svg width="480" height="280" viewBox="0 0 480 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="statsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#151515"/>
      <stop offset="100%" stop-color="#1a1d24"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6CB8E6"/>
      <stop offset="100%" stop-color="#E63946"/>
    </linearGradient>
    <style>.mono{font-family:Consolas,Menlo,monospace}.sans{font-family:-apple-system,Segoe UI,sans-serif}</style>
  </defs>
  <rect width="480" height="280" rx="18" fill="url(#statsBg)" stroke="#2a2f3a"/>
  <text x="24" y="34" class="sans" font-size="15" font-weight="700" fill="#F8F8F6">GitHub Stats</text>
  <text x="24" y="52" class="mono" font-size="10" fill="#8a93a3">// live overview</text>

  <!-- progress ring -->
  <g transform="translate(88,150)">
    <circle r="58" fill="none" stroke="#242832" stroke-width="10"/>
    <circle r="58" fill="none" stroke="url(#ringGrad)" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="364" stroke-dashoffset="364" transform="rotate(-90)">
      <animate attributeName="stroke-dashoffset" from="364" to="80" begin="0.3s" dur="1.6s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
    </circle>
    <text x="0" y="6" text-anchor="middle" class="sans" font-size="22" font-weight="700" fill="#F8F8F6">78%</text>
    <text x="0" y="24" text-anchor="middle" class="mono" font-size="9" fill="#8a93a3">GRADE B+</text>
  </g>

  <g transform="translate(190,88)" class="mono" font-size="12">
    <g fill="#c7cdd6">
      <text x="0" y="14">Total Stars Earned</text>
      <text x="270" y="14" text-anchor="end" fill="#6CB8E6" font-weight="700">
        <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.5s" fill="freeze"/>42
      </text>
      <rect x="0" y="0" width="270" height="1" fill="#242832" transform="translate(0,20)"/>

      <text x="0" y="46">Total Commits</text>
      <text x="270" y="46" text-anchor="end" fill="#6CB8E6" font-weight="700">
        <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.5s" fill="freeze"/>1,240+
      </text>
      <rect x="0" y="52" width="270" height="1" fill="#242832"/>

      <text x="0" y="78">Repositories</text>
      <text x="270" y="78" text-anchor="end" fill="#6CB8E6" font-weight="700">
        <animate attributeName="opacity" from="0" to="1" begin="1s" dur="0.5s" fill="freeze"/>49
      </text>
      <rect x="0" y="84" width="270" height="1" fill="#242832"/>

      <text x="0" y="110">Contributed (last yr)</text>
      <text x="270" y="110" text-anchor="end" fill="#E63946" font-weight="700">
        <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.5s" fill="freeze"/>310
      </text>
      <rect x="0" y="116" width="270" height="1" fill="#242832"/>

      <text x="0" y="142">Current Streak</text>
      <text x="270" y="142" text-anchor="end" fill="#E63946" font-weight="700">
        <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.5s" fill="freeze"/>12 days
      </text>
    </g>
  </g>
</svg>
