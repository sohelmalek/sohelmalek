<svg width="1000" height="260" viewBox="0 0 1000 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#111318"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#8FB8FF"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3B82F6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E2128" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1000" height="260" fill="url(#bg)"/>
  <rect width="1000" height="260" fill="url(#grid)"/>
  <rect x="200" y="0" width="600" height="260" fill="url(#glow)"/>

  <!-- top accent line -->
  <rect x="0" y="0" width="1000" height="2" fill="url(#accentGrad)"/>

  <!-- eyebrow -->
  <text x="60" y="90" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="15" fill="#3B82F6" letter-spacing="3">FULL STACK WEB DEVELOPER</text>

  <!-- name -->
  <text x="58" y="150" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="56" font-weight="700" fill="url(#textGrad)">Sohel Malek</text>

  <!-- typed cursor -->
  <rect x="480" y="115" width="4" height="42" fill="#3B82F6">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- subline -->
  <text x="60" y="188" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="17" fill="#9AA4B2">Building fast, scalable, production-grade web applications</text>

  <!-- bottom accent line -->
  <rect x="0" y="258" width="1000" height="2" fill="url(#accentGrad)"/>
</svg>
