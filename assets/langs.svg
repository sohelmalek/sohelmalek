<svg width="480" height="280" viewBox="0 0 480 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="langsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#151515"/>
      <stop offset="100%" stop-color="#1a1d24"/>
    </linearGradient>
  </defs>
  <style>.mono{font-family:Consolas,Menlo,monospace}.sans{font-family:-apple-system,Segoe UI,sans-serif}</style>
  <rect width="480" height="280" rx="18" fill="url(#langsBg)" stroke="#2a2f3a"/>
  <text x="24" y="34" class="sans" font-size="15" font-weight="700" fill="#F8F8F6">Most Used Languages</text>
  <text x="24" y="52" class="mono" font-size="10" fill="#8a93a3">// by repository bytes</text>

  <g transform="translate(24,76)" font-size="12" class="mono">
    <!-- JavaScript -->
    <text y="10" fill="#F8F8F6">JavaScript</text>
    <text x="432" y="10" text-anchor="end" fill="#8a93a3">38%</text>
    <rect y="16" width="432" height="8" rx="4" fill="#242832"/>
    <rect y="16" height="8" rx="4" fill="#6CB8E6" width="0">
      <animate attributeName="width" from="0" to="164" begin="0.3s" dur="1s" fill="freeze"/>
    </rect>

    <text y="52" fill="#F8F8F6">HTML</text>
    <text x="432" y="52" text-anchor="end" fill="#8a93a3">24%</text>
    <rect y="58" width="432" height="8" rx="4" fill="#242832"/>
    <rect y="58" height="8" rx="4" fill="#E63946" width="0">
      <animate attributeName="width" from="0" to="104" begin="0.45s" dur="1s" fill="freeze"/>
    </rect>

    <text y="94" fill="#F8F8F6">CSS</text>
    <text x="432" y="94" text-anchor="end" fill="#8a93a3">18%</text>
    <rect y="100" width="432" height="8" rx="4" fill="#242832"/>
    <rect y="100" height="8" rx="4" fill="#6CB8E6" width="0" opacity="0.75">
      <animate attributeName="width" from="0" to="78" begin="0.6s" dur="1s" fill="freeze"/>
    </rect>

    <text y="136" fill="#F8F8F6">PHP</text>
    <text x="432" y="136" text-anchor="end" fill="#8a93a3">11%</text>
    <rect y="142" width="432" height="8" rx="4" fill="#242832"/>
    <rect y="142" height="8" rx="4" fill="#E63946" width="0" opacity="0.7">
      <animate attributeName="width" from="0" to="48" begin="0.75s" dur="1s" fill="freeze"/>
    </rect>

    <text y="178" fill="#F8F8F6">TypeScript</text>
    <text x="432" y="178" text-anchor="end" fill="#8a93a3">9%</text>
    <rect y="184" width="432" height="8" rx="4" fill="#242832"/>
    <rect y="184" height="8" rx="4" fill="#6CB8E6" width="0" opacity="0.55">
      <animate attributeName="width" from="0" to="39" begin="0.9s" dur="1s" fill="freeze"/>
    </rect>
  </g>
</svg>
